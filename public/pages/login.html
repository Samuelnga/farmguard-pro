<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FarmGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="logo-mark">🌿</div>
        <span>Farm<strong>Guard</strong></span>
      </a>
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to your farmer account</p>

      <div class="auth-error" id="authError"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="yourname@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button class="btn-auth" id="loginBtn" onclick="login()">Login to Dashboard</button>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/register.html">Sign up free</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('fg_token')) window.location.href = '/pages/dashboard.html';

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('authError');

      if (!email || !password) {
        showError('Please enter your email and password.'); return;
      }

      btn.disabled    = true;
      btn.textContent = 'Logging in...';
      errEl.classList.remove('show');

      try {
        const data = await API.post('/api/auth/login', { email, password });
        localStorage.setItem('fg_token', data.token);
        localStorage.setItem('fg_user', JSON.stringify(data.user));
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        showError(err.message || 'Login failed. Check your credentials.');
        btn.disabled    = false;
        btn.textContent = 'Login to Dashboard';
      }
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
