<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FarmGuard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-logo">
        <div class="logo-mark">🌿</div>
        <span>Farm<strong>Guard</strong></span>
      </a>
      <h2>Create Account</h2>
      <p class="subtitle">Start protecting your crops today — free</p>

      <div class="auth-error" id="authError"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="e.g. Emeka Okafor" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="08012345678">
        </div>
      </div>
      <div class="form-group">
        <label>State (Nigeria)</label>
        <select id="state">
          <option value="">Select your state</option>
          <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option>
          <option>Anambra</option><option>Bauchi</option><option>Bayelsa</option>
          <option>Benue</option><option>Borno</option><option>Cross River</option>
          <option>Delta</option><option>Ebonyi</option><option>Edo</option>
          <option>Ekiti</option><option>Enugu</option><option>FCT - Abuja</option>
          <option>Gombe</option><option>Imo</option><option>Jigawa</option>
          <option>Kaduna</option><option>Kano</option><option>Katsina</option>
          <option>Kebbi</option><option>Kogi</option><option>Kwara</option>
          <option>Lagos</option><option>Nasarawa</option><option>Niger</option>
          <option>Ogun</option><option>Ondo</option><option>Osun</option>
          <option>Oyo</option><option>Plateau</option><option>Rivers</option>
          <option>Sokoto</option><option>Taraba</option><option>Yobe</option>
          <option>Zamfara</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" required>
      </div>

      <button class="btn-auth" id="registerBtn" onclick="register()">Create Free Account</button>

      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (localStorage.getItem('fg_token')) window.location.href = '/pages/dashboard.html';

    async function register() {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const state    = document.getElementById('state').value;
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('registerBtn');

      if (!name || !email || !password) {
        showError('Name, email and password are required.'); return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account...';
      document.getElementById('authError').classList.remove('show');

      try {
        const data = await API.post('/api/auth/register', { name, email, phone, state, password });
        localStorage.setItem('fg_token', data.token);
        localStorage.setItem('fg_user', JSON.stringify(data.user));
        window.location.href = '/pages/dashboard.html';
      } catch (err) {
        showError(err.message || 'Registration failed. Please try again.');
        btn.disabled    = false;
        btn.textContent = 'Create Free Account';
      }
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
